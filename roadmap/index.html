<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>ReturnKoto? Roadmap</title>
<meta property="og:type" content="website">
<meta property="og:site_name" content="ReturnKoto?">
<meta property="og:url" content="https://returnkoto.com/roadmap/">
<meta property="og:title" content="ReturnKoto? Roadmap">
<meta property="og:description" content="Where ReturnKoto? is headed.">
<meta property="og:image" content="https://returnkoto.com/og-card.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="ReturnKoto? Roadmap">
<meta name="twitter:description" content="Where ReturnKoto? is headed.">
<meta name="twitter:image" content="https://returnkoto.com/og-card.png">
<style>
  :root{--green:#2ECC71;--green-d:#1F9E57}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    min-height:100dvh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:clamp(18px,4.5vh,34px);
    padding:34px 20px;
    text-align:center;
    color:#EAF1EC;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(125% 95% at 50% 16%, #12281c 0%, #0c1712 46%, #070d0a 100%);
    overflow:hidden;
  }
  .glow{position:fixed;border-radius:50%;filter:blur(90px);opacity:.45;pointer-events:none;z-index:0}
  .g1{width:440px;height:440px;background:#1F9E57;top:-130px;left:-90px;animation:drift1 13s ease-in-out infinite}
  .g2{width:380px;height:380px;background:#0f8f4d;bottom:-140px;right:-70px;animation:drift2 16s ease-in-out infinite}
  .g3{width:260px;height:260px;background:#2ECC71;top:42%;left:58%;opacity:.22;animation:drift3 11s ease-in-out infinite}
  @keyframes drift1{0%,100%{transform:translate(0,0)}50%{transform:translate(70px,44px)}}
  @keyframes drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-56px,-34px)}}
  @keyframes drift3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-40px,28px) scale(1.18)}}

  .eyebrow{position:relative;z-index:1;display:inline-flex;align-items:center;gap:9px;
    font-size:12.5px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--green);
    opacity:0;animation:rise .7s .1s ease-out forwards, letterdance 4.5s 1.2s ease-in-out infinite}
  .eyebrow .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 14px var(--green);animation:pulse 1.8s ease-in-out infinite}

  h1{position:relative;z-index:1;font-size:clamp(34px,7.4vw,66px);font-weight:800;letter-spacing:-.025em;line-height:1.03;
    opacity:0;animation:rise .75s .22s ease-out forwards}
  h1 .g{color:var(--green);display:inline-block;animation:wiggle 2.8s 1s ease-in-out infinite}

  .gifwrap{position:relative;z-index:1;opacity:0;transform:scale(.93);
    animation:pop .85s .4s cubic-bezier(.2,.85,.25,1) forwards}
  .gifwrap::before{content:"";position:absolute;inset:-10px;border-radius:24px;
    background:conic-gradient(from var(--spin,0deg),rgba(46,204,113,.55),rgba(46,204,113,0),rgba(31,158,87,.45),rgba(46,204,113,0),rgba(46,204,113,.55));
    z-index:-2;filter:blur(10px);opacity:.75;animation:spinborder 8s linear infinite}
  .gifwrap::after{content:"";position:absolute;inset:-2px;border-radius:20px;
    background:linear-gradient(135deg,rgba(46,204,113,.5),rgba(31,158,87,0));z-index:-1;filter:blur(14px);opacity:.7;
    animation:glowpulse 3.2s ease-in-out infinite}
  .gifwrap picture,.gifwrap img{display:block}
  .gifwrap img{width:min(88vw,540px);height:auto;border-radius:18px;aspect-ratio:4/3;object-fit:cover;
    border:1px solid rgba(46,204,113,.35);
    box-shadow:0 22px 64px rgba(0,0,0,.55),0 0 0 6px rgba(46,204,113,.06);
    filter:blur(7px) saturate(.85) brightness(1.05);
    transform-origin:center;
    animation:bob 5.5s ease-in-out infinite, softfocus 7s ease-in-out infinite, tilt 9s ease-in-out infinite;
    image-rendering:auto}

  .cap{position:relative;z-index:1;font-size:14px;font-weight:600;color:#9FB0A6;
    opacity:0;animation:rise .7s .62s ease-out forwards, sway 6s 1.4s ease-in-out infinite}
  .cap b{color:#CBD6CF}
  .home-btn{position:relative;z-index:1;display:inline-flex;align-items:center;gap:8px;
    font-size:14px;font-weight:700;color:#08130d;background:var(--green);
    padding:12px 24px;border-radius:999px;text-decoration:none;
    box-shadow:0 10px 26px rgba(46,204,113,.32);transition:transform .14s,box-shadow .14s;
    opacity:0;animation:rise .7s .76s ease-out forwards, btnbounce 3.6s 1.6s ease-in-out infinite}
  .home-btn:hover{transform:translateY(-2px);box-shadow:0 14px 32px rgba(46,204,113,.42)}

  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pop{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-.6deg) scale(1)}50%{transform:translateY(-10px) rotate(.6deg) scale(1.02)}}
  @keyframes softfocus{
    0%,100%{filter:blur(8px) saturate(.8) brightness(1.04)}
    45%{filter:blur(4.5px) saturate(.95) brightness(1.08)}
    70%{filter:blur(6px) saturate(.88) brightness(1.05)}
  }
  @keyframes tilt{0%,100%{border-radius:18px}50%{border-radius:28px 14px 24px 16px}}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.55);opacity:.55}}
  @keyframes glowpulse{0%,100%{opacity:.55}50%{opacity:.95}}
  @keyframes spinborder{to{--spin:360deg}}
  @property --spin{syntax:"<angle>";inherits:false;initial-value:0deg}
  @keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-3deg)}75%{transform:rotate(3deg)}}
  @keyframes letterdance{0%,100%{letter-spacing:.16em}50%{letter-spacing:.22em}}
  @keyframes sway{0%,100%{transform:translateX(0)}50%{transform:translateX(4px)}}
  @keyframes btnbounce{0%,100%{transform:translateY(0)}40%{transform:translateY(-3px)}60%{transform:translateY(0)}}
  @media(prefers-reduced-motion:reduce){
    *{animation:none!important}
    .eyebrow,h1,.gifwrap,.cap,.home-btn{opacity:1;transform:none}
    .gifwrap img{filter:blur(6px) saturate(.85)}
  }
</style>
</head>
<body>
  <div class="glow g1"></div>
  <div class="glow g2"></div>
  <div class="glow g3"></div>

  <div class="eyebrow"><span class="dot"></span>The plan</div>
  <h1>ReturnKoto<span class="g">?</span> <span class="g">Roadmap</span></h1>
  <div class="gifwrap">
    <picture>
      <source type="image/webp" srcset="nggup.webp">
      <img src="nggup.jpg" width="260" height="195" alt="ReturnKoto? Roadmap" decoding="async" fetchpriority="high">
    </picture>
  </div>
  <p class="cap">A full commitment's what I'm thinking of<br>You wouldn't get this from any other guy</p>
  <a class="home-btn" href="/">&#8592; Go to homepage</a>
</body>
</html>
